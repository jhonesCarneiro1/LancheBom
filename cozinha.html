<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cozinha</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
}
h2 { text-align: center; }

.pedido {
  background: #222;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
  border-left: 5px solid yellow;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border: none;
  font-weight: bold;
  cursor: pointer;
  border-radius: 5px;
}

.info { font-size: 14px; color: #ccc; }

#btnSom {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: red;
  width: 70px;
  height: 70px;
  font-size: 26px;
}

.btn-local {
  background: #2196f3;
}

.btn-entrega {
  background: #4caf50;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<!-- 🔥 CONTEÚDO PROTEGIDO -->
<div id="conteudo" style="display:none;">

<h2>🍳 Pedidos</h2>
<div id="lista"></div>

<audio id="som">
  <source src="https://raw.githubusercontent.com/jhonesCarneiro1/LancheBom/main/lanchepedido.mp3" type="audio/mpeg">
</audio>

<button id="btnSom" onclick="ativarSom()">🔊</button>

</div>

<!-- 🔥 SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, onChildAdded, push, get, update } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCm4W6_B_aSWld-vi_5pjwP5uowZVHirlY",
  authDomain: "lanchebom-991d9.firebaseapp.com",
  databaseURL: "https://lanchebom-991d9-default-rtdb.firebaseio.com",
  projectId: "lanchebom-991d9",
  storageBucket: "lanchebom-991d9.appspot.com",
  messagingSenderId: "442622892318",
  appId: "1:442622892318:web:af6a12026d2212b4d2510f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const lista = document.getElementById("lista");
const som = document.getElementById("som");

let liberado = false;

// 🔐 LOGIN
window.login = function() {
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  signInWithEmailAndPassword(auth, email, senha)
    .then(() => console.log("logado"))
    .catch((e) => alert(e.message));
};

// 🔥 LIBERAR TELA APÓS LOGIN
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("conteudo").style.display = "block";

    iniciarCozinha(); // 👈 ESSENCIAL
  }
});

// 🔊 SOM
window.ativarSom = function() {
  som.play().then(() => {
    som.pause();
    som.currentTime = 0;
    liberado = true;
    document.getElementById("btnSom").style.display = "none";
  });
};

// 🔥 INICIAR COZINHA (SÓ DEPOIS DO LOGIN)
function iniciarCozinha() {

  onChildAdded(ref(db, "pedidos"), (snapshot) => {
    let p = snapshot.val();

    if (
      p.status === "pronto" || 
      p.status === "finalizado" || 
      p.status === "entregue"
    ) return;

    if (liberado) {
      som.currentTime = 0;
      som.play().catch(() => {});
    }

    let div = document.createElement("div");
    div.className = "pedido";

     // 🎯 COR POR TIPO
    if (p.tipo === "local") {
      div.style.borderLeft = "5px solid #2196f3";
    } else {
      div.style.borderLeft = "5px solid #4caf50";
    }
   // 🎯 BOTÃO DINÂMICO
    let botoes = "";

    if (p.tipo === "local") {
      botoes = `
        <button class="btn-local" onclick="finalizarLocal('${snapshot.key}', this)">
          🏪 Pronto (Local)
        </button>
      `;
    } else {
      botoes = `
        <button class="btn-entrega" onclick="enviarEntrega('${snapshot.key}', this)">
          🛵 Enviar para Entrega
        </button>
      `;
    }

    div.innerHTML = `
      <strong>👤 ${p.cliente}</strong><br>
      <span class="info">📞 ${p.telefone || "não informado"}</span><br>
      <span class="info">📍 ${p.endereco || "retirada no local"}</span><br>
      <span class="info">🕒 ${p.hora}</span><br><br>

      ${p.pedido.replace(/\n/g, "<br>")}

      <br><br>
      <strong>💰 Total: R$ ${p.total || 0}</strong>

      ${botoes}
    `;

    lista.prepend(div);
  });

}

// 🛵 ENTREGA
window.enviarEntrega = function(id, botao) {
  if (!confirm("Enviar para entrega?")) return;

  let pedidoRef = ref(db, "pedidos/" + id);

  get(pedidoRef).then((snapshot) => {
    if (!snapshot.exists()) {
      alert("Pedido não encontrado");
      return;
    }

    let dados = snapshot.val();

    push(ref(db, "entregas_ativas"), {
      ...dados,
      pedidoId: id,
      status: "novo"
    })
    .then(() => {
      console.log("✅ Enviado pro motoboy");

      update(ref(db, "pedidos/" + id), {
        status: "pronto",
        tipo: "delivery"
      });

      botao.parentElement.remove();
    })
    .catch((erro

// 🏪 LOCAL
window.finalizarLocal = function(id, botao) {
  if (!confirm("Finalizar pedido local?")) return;

  update(ref(db, "pedidos/" + id), {
    status: "finalizado",
    tipo: "local"
  });

  botao.parentElement.remove();
};

</script>

</body>
</html>
