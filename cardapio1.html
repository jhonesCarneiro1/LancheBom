<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cardápio Online</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e53935">

<style>

body {
  font-family: Arial;
  background: #111;
  color: white;
  margin: 0;
}

.container {
  max-width: 430px;
  margin: auto;
  padding: 15px;
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  background: #e53935;
  color: white;
  border: none;
  font-weight: bold;
  margin-bottom: 5px;
  border-radius: 10px;
}

.item {
  border-bottom: 1px solid #444;
  padding: 5px 0;
}

/* CARDÁPIO */
#cardapio {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

/* CARD NOVO */
.card-product {
  width: calc(50% - 5px);
  background: #222;
  border-radius: 15px;
  overflow: hidden;
  border: 1px solid #333;
}

.img-wrapper {
  width: 100%;
  height: 120px;
  overflow: hidden;
}

.img-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-body {
  padding: 10px;
  text-align: center;
}

.product-title {
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 5px;
}

.product-desc {
  font-size: 12px;
  color: #aaa;
  min-height: 30px;
}

.price-main {
  color: #4caf50;
  font-weight: bold;
  margin-top: 5px;
  display: block;
}

.btn-add {
  margin-top: 8px;
  background: #0d6efd;
  border: none;
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  color: white;
  font-size: 18px;
}

/* PAGAMENTO */
.pagamento {
  flex: 1;
  background: #333;
}

.pagamento.ativo {
  background: #4caf50;
}

#pagamentoBox {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

</style>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container">

<h2>🍔 Fazer Pedido</h2>

<input type="text" id="cliente" placeholder="Seu nome">
<input type="tel" id="telefone" placeholder="Seu WhatsApp">
<input type="text" id="cep" placeholder="CEP">
<input type="text" id="endereco" placeholder="Seu endereço">

<img id="foto" style="width:100%; margin-bottom:10px; border-radius:10px;">

<!-- CARDÁPIO -->
<div id="cardapio"></div>

<textarea id="obs" placeholder="Observação..."></textarea>

<!-- 🔥 PAGAMENTO MELHORADO -->
<div id="pagamentoBox">
  <button type="button" class="pagamento ativo" onclick="selecionarPagamento('entrega', this)">💵 Entrega</button>
  <button type="button" class="pagamento" onclick="selecionarPagamento('pix', this)">💳 PIX / Cartão</button>
</div>

<hr>

<div id="lista"></div>

<hr>

<div style="font-weight:bold;">
  Total: R$ <span id="total">0</span>
</div>

<button onclick="enviar()">📤 Enviar Pedido</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

/* 🔥 CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyCm4W6_B_aSWld-vi_5pjwP5uowZVHirlY",
  authDomain: "lanchebom-991d9.firebaseapp.com",
  databaseURL: "https://lanchebom-991d9-default-rtdb.firebaseio.com",
  projectId: "lanchebom-991d9",
  storageBucket: "lanchebom-991d9.firebasestorage.app",
  messagingSenderId: "442622892318",
  appId: "1:442622892318:web:af6a12026d2212b4d2510f",
  measurementId: "G-4EBW5J014C"
};
document.getElementById("telefone").addEventListener("input", function() {
  this.value = this.value.replace(/\D/g, "");
});
  document.getElementById("cep").addEventListener("blur", function() {
  let cep = this.value.replace(/\D/g, "");

  if (cep.length !== 8) return;

  fetch(`https://viacep.com.br/ws/${cep}/json/`)
    .then(res => res.json())
    .then(dados => {
      if (!dados.erro) {
        document.getElementById("endereco").value =
          dados.logradouro + ", " +
          dados.bairro + " - " +
          dados.localidade;
      }
    });
});
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* 🔥 VARIÁVEIS GLOBAIS (IMPORTANTE) */
let pedidos = [];
let produtos = [];
let total = 0;
let formaPagamento = "entrega";
let chavePix = "SEU_PIX_AQUI"; // telefone, cpf ou email
/* 🔥 ESCOLHER PAGAMENTO */
window.selecionarPagamento = function(tipo, el) {
  formaPagamento = tipo;

  document.querySelectorAll(".pagamento").forEach(btn => {
    btn.classList.remove("ativo");
  });

  el.classList.add("ativo");
};

/* 🔥 TELEFONE NUMÉRICO */
document.getElementById("telefone").addEventListener("input", function() {
  this.value = this.value.replace(/\D/g, "");
});

/* 🔥 CARREGAR PRODUTOS */
onValue(ref(db, "produtos"), (snapshot) => {
  produtos = [];

  snapshot.forEach(item => {
    produtos.push(item.val());
  });

  carregarProdutos();
});

/* 🔥 MOSTRAR CARDÁPIO */
function carregarProdutos() {

  let div = document.getElementById("cardapio");

  div.innerHTML = "";

  produtos.forEach((p, i) => {

    div.innerHTML += `
    
    <div class="col-6 col-md-4 col-lg-3">

      <div class="card card-product">

        <div class="img-wrapper">
          <img src="${p.imagem || 'https://via.placeholder.com/300'}">
        </div>

        <div class="p-3 d-flex flex-column flex-grow-1">

          <h6 class="fw-bold mb-1 text-truncate">
            ${p.nome}
          </h6>

          <p class="product-desc">
            ${p.descricao || 'Delicioso lanche'}
          </p>

          <div class="d-flex justify-content-between align-items-center mt-auto">

            <div>
              <span class="price-main">
                R$ ${p.preco}
              </span>
            </div>

            <button onclick="selecionar(${i})"
              class="btn-add bg-primary">

              +

            </button>

          </div>

        </div>

      </div>

    </div>

    `;

  });

}

/* 🔥 CLICAR NO PRODUTO */
window.selecionar = function(index) {
  let produto = produtos[index];

  document.getElementById("foto").src = produto.imagem || "";

  let obs = prompt("Observação?");

  pedidos.push({
    nome: produto.nome,
    preco: produto.preco,
    obs: obs || ""
  });

  total += produto.preco;
  atualizarTela();
};

/* 🔥 ATUALIZAR TELA */
function atualizarTela() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  pedidos.forEach(item => {
    lista.innerHTML += `
      <div class="item">
        ${item.nome}
        <br><small>${item.obs}</small>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

/* 🔥 ENVIAR PEDIDO */
window.enviar = function() {

  let cliente = document.getElementById("cliente").value;
  let telefone = document.getElementById("telefone").value;
  let endereco = document.getElementById("endereco").value;

  if (!cliente || !telefone) {
    alert("Preencha nome e telefone");
    return;
  }

  if (pedidos.length === 0) {
    alert("Adicione itens");
    return;
  }

  let resumo = pedidos.map(p =>
    `${p.nome} (${p.obs || "sem observação"})`
  ).join("\n");

  push(ref(db, "pedidos"), {
    cliente,
    telefone,
    endereco: endereco || "Retirada",
    pedido: resumo,
    total,
    hora: new Date().toLocaleTimeString(),
    formaPagamento,
    statusPagamento: "pendente",
  }).then(() => {

  if (formaPagamento === "pix") {

    let mensagem = `
💰 PAGAMENTO VIA PIX

Valor: R$ ${total}

Chave PIX:
${chavePix}

📲 Envie o comprovante no WhatsApp para confirmar seu pedido.
    `;

    alert(mensagem);

    let texto = encodeURIComponent(
`Pedido realizado!\nTotal: R$ ${total}\nVou enviar o comprovante do PIX.`
    );

    window.open(`https://wa.me/11976681884?text=${texto}`);

  } else {

    alert("Pedido enviado! Pague na entrega.");

  }

  // 🔥 LIMPAR PEDIDO (muito importante)
  pedidos = [];
  total = 0;
  atualizarTela();

  document.getElementById("cliente").value = "";
  document.getElementById("telefone").value = "";
  document.getElementById("endereco").value = "";

});
    }
</script>

</body>
</html>
